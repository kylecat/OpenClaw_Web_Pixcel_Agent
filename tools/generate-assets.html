// ─── Render ───────────────────────────────────────────────────────────────
function artToCanvas(asset) {
  const cvs = document.createElement('canvas')
  cvs.width = asset.w
  cvs.height = asset.h
  const ctx = cvs.getContext('2d')
  const img = ctx.createImageData(asset.w, asset.h)
  for (let r = 0; r < asset.h; r++) {
    const row = asset.art[r] || ''
    for (let c = 0; c < asset.w; c++) {
      const ch = row[c] || '_'
      const color = P[ch] || P['_']
      const idx = (r * asset.w + c) * 4
      img.data[idx]   = color[0]
      img.data[idx+1] = color[1]
      img.data[idx+2] = color[2]
      img.data[idx+3] = color[3]
    }
  }
  ctx.putImageData(img, 0, 0)
  return cvs
}

function download(canvas, filename) {
  const link = document.createElement('a')
  link.download = filename
  link.href = canvas.toDataURL('image/png')
  link.click()
}

// ─── Build UI ────────────────────────────────────────────────────────────
const grid = document.getElementById('grid')

  const src = artToCanvas(asset)

  const card = document.createElement('div')

  const title = document.createElement('h2')
  title.textContent = asset.name + '.png'

  const size = document.createElement('div')
  size.className = 'size'
  size.textContent = asset.w + ' × ' + asset.h + ' px'

  const previews = document.createElement('div')
  previews.className = 'previews'

  ;[1, 2, 4, 8].forEach(scale => {
    const wrap = document.createElement('div')
    wrap.className = 'preview-wrap'

    const cv = document.createElement('canvas')
    cv.width  = asset.w * scale
    cv.height = asset.h * scale
    cv.style.width  = (asset.w * scale) + 'px'
    cv.style.height = (asset.h * scale) + 'px'
    cv.style.imageRendering = 'pixelated'
    const cx = cv.getContext('2d')
    cx.imageSmoothingEnabled = false
    cx.drawImage(src, 0, 0, asset.w * scale, asset.h * scale)

    const lbl = document.createElement('span')
    lbl.textContent = scale + '×'

    wrap.appendChild(cv)
    wrap.appendChild(lbl)
    previews.appendChild(wrap)
  })

  const btn = document.createElement('button')
  btn.textContent = '⬇ 下載 ' + asset.name + '.png'
  btn.addEventListener('click', () => {
    download(src, asset.name + '.png')
    btn.textContent = '✓ 已下載'
    btn.style.background = '#1a4a2a'
    setTimeout(() => {
      btn.textContent = '⬇ 下載 ' + asset.name + '.png'
      btn.style.background = ''
    }, 2000)
  })

  card.appendChild(title)
  card.appendChild(size)
  card.appendChild(previews)
  card.appendChild(btn)
  grid.appendChild(card)
})

// ─── Download all ─────────────────────────────────────────────────────────
document.getElementById('btn-all').addEventListener('click', async () => {

  btn.textContent = '⏳ 下載中...'
  for (let i = 0; i < ASSETS.length; i++) {
    const asset = ASSETS[i]
    const src = artToCanvas(asset)
    await new Promise(resolve => setTimeout(resolve, 300))
    download(src, asset.name + '.png')
  }
  btn.textContent = '✓ 全部下載完成！'
  setTimeout(() => { btn.textContent = '⬇ 下載全部 PNG' }, 3000)
})
